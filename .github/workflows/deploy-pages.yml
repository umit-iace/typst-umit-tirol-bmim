name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install fonts
        run: |
          sudo apt update
          sudo apt install -y lmodern cm-super fonts-cmu

      - name: Install Touying Exporter
        run: pip install touying

      - name: Determine and check package metadata
        run: |
          . scripts/setup @local

      - name: Build HTML File
        run: |
          mkdir -p build_output
          touying compile ./example/slides.typ --root . --output build_output/index.html --format html

      - name: Upload Artifacts
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: build_output/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
